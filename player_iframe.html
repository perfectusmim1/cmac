            parseHashParams(hash) {
                if (!hash || hash === '#') return {};

                const params = {};
                const hashString = hash.substring(1);

                    if (key && value) {

                        });
                        this.initSkipButton();

                        this.player.core.activePlayback.on(Clappr.Events.PLAYBACK_ENDED, () => {
                            this.skipAd();
                        });

                        this.player.core.activePlayback.on(Clappr.Events.PLAYBACK_ERROR, () => {
                            this.skipAd();
                        });
                    } else {
                        this.player.configure({
                            source: this.config.stream.defaultSource,
                            watermark: this.urlConfig.watermark,
                            watermarkLink: this.urlConfig.watermarkLink,
                            position: this.urlConfig.watermarkPosition
                        });
                        this.tryInitP2P();
                        if (!this.bannerInitialized) {
                            this.initBanner();
                            this.bannerInitialized = true;
                        }
                        if (!this.textOverlayInitialized) {
                            this.initTextOverlay();
                            this.textOverlayInitialized = true;
                        }
                        if (!this.overlayBannerInitialized) {
                            this.initOverlayBanner();
                            this.overlayBannerInitialized = true;
                        }
                        this.player.core.activePlayback.on(Clappr.Events.PLAYBACK_ERROR, () => {
                            this.handlePlaybackError();
                        });
                        $('.clappr-watermark a').removeAttr("target").removeAttr("href").css("cursor", "initial");
                    }
                });

                this.player.on(Clappr.Events.PLAYER_ERROR, () => {
                    this.handlePlaybackError();
                });
            }

            selectAdSource() {
                const referrer = document.referrer.length ? document.referrer : "https://" + this.parseHashParams(window.location.hash).referrer;
                const provider = Object.entries(this.config.ads.providers).find(([pattern]) => {
                    const result = new RegExp(pattern).test(referrer);
                    console.log("pattern :", pattern, "referrer: ", referrer);
                    return result;
                });
                this.config.ads.enabled = provider?.[1].enabled;

                return provider?.[1].source || this.config.stream.defaultSource;
            }

            initControls() {}

            initTracking() {

            }

            handlePlaybackError() {
                console.error('Playback error detected');
                // setTimeout(() => location.reload(), 5000);
            }

            initSkipButton() {
                const skipButton = $('<div data-advertisement />');
                const skipText = $('<button type="button" />').text(`REKLAMI GEÇMEK İÇİN ${this.skipOffset} SANİYE KALDI`);
                skipButton.append(skipText);

                const adLink = $('<div data-advertisement-link />');
                const link = $('<a />').attr({
                    href: Object.entries(this.config.ads.providers).find(([pattern]) =>
                        new RegExp(pattern).test(document.referrer)
                    )?.[1]?.link || '#',
                    target: '_blank'
                }).css({
                    display: 'inline-block',
                    height: '100%',
                    width: '100%',
                    pointerEvents: 'none'
                });
                adLink.append(link);

                skipButton.hide();
                adLink.hide();
                $('body').prepend(skipButton, adLink);

                this.player.core.activePlayback.once(Clappr.Events.PLAYBACK_PLAY, () => {
                    skipButton.show();
                    adLink.show();
                    link.css('pointerEvents', 'auto');

                    this.skipTimer = setInterval(() => {
                        this.elapsedTime++;
                        if (this.elapsedTime >= this.skipOffset) {
                            skipText.text('REKLAMI GEÇ').css('cursor', 'pointer');
                            skipText.on('click', () => this.skipAd());
                            clearInterval(this.skipTimer);
                        } else {
                            skipText.text(`REKLAMI GEÇMEK İÇİN ${this.skipOffset - this.elapsedTime} SANİYE KALDI`);
                        }
                    }, 1000);
                });
            }

            skipAd() {
                $('[data-advertisement], [data-advertisement-link]').remove();
                this.adSkipped = true;
                this.player.configure({
                    source: this.config.stream.defaultSource,
                    watermark: this.urlConfig.watermark,
                    watermarkLink: this.urlConfig.watermarkLink,
                    position: this.urlConfig.watermarkPosition
                });
                this.tryInitP2P();

                if (!this.bannerInitialized) {
                    this.initBanner();
                    this.bannerInitialized = true;
                }
                if (!this.textOverlayInitialized) {
                    this.initTextOverlay();
                    this.textOverlayInitialized = true;
                }
                if (!this.overlayBannerInitialized) {
                    this.initOverlayBanner();
                    this.overlayBannerInitialized = true;
                }
            }

            initBanner() {
                if (!this.config.banner.enabled) return;

                if (!this.config.banner.image || !this.config.banner.link) return;

                const bannerHtml = `
                    <div data-free-banner>
                        <div data-f-cl>
                            <a data-free-close href="javascript:void(0)">&times;</a>
                        </div>
                        <a href="${this.config.banner.link}" target="_blank">
                            <img src="${this.config.banner.image}" alt="">
                        </a>
                    </div>
                `;

                $('#player-container .container').prepend(bannerHtml);

                $('[data-free-close]').on('click', (e) => {
                    e.preventDefault();
                    $('[data-free-banner]').hide();
                    return false;
                });
            }

            initTextOverlay() {
                const referrer = document.referrer;
                const entry = Object.entries(this.config.text.data).find(([pattern]) => {
                    return new RegExp(pattern).test(referrer);
                });

                if (!entry) {
                    return;
                }

                const providerConfig = entry[1] || {};

                $(document).off('click.textOverlayClose').on('click.textOverlayClose', '[data-text-close]', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    $('[data-text-overlay]').hide();
                    return false;
                });

                const isNewFormat = providerConfig.template && Array.isArray(providerConfig.campaigns);
                if (isNewFormat) {
                    const template = decodeURIComponent(providerConfig.template).replaceAll('+', ' ');
                    const interval = Number(providerConfig.interval) || 15000;
                    const campaigns = (providerConfig.campaigns || [])
                        .map(c => {
                            const rawLabel = c.label || c.text || '';
                            const label = decodeURIComponent(rawLabel).replaceAll('+', ' ');
                            const link = c.link || '#';
                            return {
                                label,
                                link
                            };
                        })
                        .filter(c => c.label && c.link);

                    if (!campaigns.length) return;

                    const initialText = template.includes('{CAMPAIGN}') ?
                        template.replace('{CAMPAIGN}', campaigns[0].label) :
                        `${template} ${campaigns[0].label}`;

                    if (!$('[data-text-overlay]').length) {
                        const textOverlayHtml = `
                            <div data-text-overlay>
                                <a data-text-link href="${campaigns[0].link}" target="_blank">${initialText}</a>
                                <a data-text-close href="javascript:void(0)">&times;</a>
                            </div>
                        `;
                        $('#player-container .container').prepend(textOverlayHtml);
                    } else {
                        $('[data-text-overlay] [data-text-link]')
                            .attr('href', campaigns[0].link)
                            .text(initialText);
                    }

                    if (this.textRotationIntervalId) {
                        clearInterval(this.textRotationIntervalId);
                        this.textRotationIntervalId = null;
                    }

                    let index = 0;
                    this.textRotationIntervalId = setInterval(() => {
                        index = (index + 1) % campaigns.length;
                        const nextText = template.includes('{CAMPAIGN}') ?
                            template.replace('{CAMPAIGN}', campaigns[index].label) :
                            `${template} ${campaigns[index].label}`;
                        $('[data-text-overlay] [data-text-link]')
                            .attr('href', campaigns[index].link)
                            .text(nextText);
                    }, interval);

                    return;
                }

                if (!providerConfig.text || !providerConfig.link) {
                    return;
                }

                const legacyText = decodeURIComponent(providerConfig.text).replaceAll('+', ' ');
                const legacyLink = providerConfig.link;
                const textOverlayHtml = `
                    <div data-text-overlay>
                        <a data-text-link href="${legacyLink}" target="_blank">${legacyText}</a>
                        <a data-text-close href="javascript:void(0)">&times;</a>
                    </div>
                `;

                $('#player-container .container').prepend(textOverlayHtml);
            }

            initOverlayBanner() {
                const referrer = document.referrer;
                const provider = Object.entries(this.config.overlayBanner.providers).find(([pattern]) => {
                    return new RegExp(pattern).test(referrer);
                });

                if (!provider || !provider[1].enabled) {
                    return;
                }

                if (StreamPlayer.getCookie('overlay_banner_closed')) {
                    return;
                }

                const config = provider[1];
                const banners = config.banners;
                const layout = config.layout || '4';
                const title = config.title || '';

                if (!banners || banners.length === 0) {
                    return;
                }

                let displayBanners = [];
                if (layout === '2') {
                    displayBanners = banners.slice(0, 2);
                } else if (layout === '4') {
                    displayBanners = banners.slice(0, 4);
                } else {
                    displayBanners = banners;
                }

                const gridClass = layout === '2' ? 'grid-2' : 'grid-4';

                const titleHtml = title ? `<div data-banner-title>${decodeURIComponent(title).replaceAll('+', ' ')}</div>` : '';

                let bannersHtml = '';
                displayBanners.sort(() => Math.random() - 0.5);
                displayBanners.forEach((banner, index) => {
                    bannersHtml += `
    <div data-banner-item>
        <a href="${banner.link}" target="_blank">
            <img src="${banner.image}" alt="Banner ${index + 1}">
        </a>
    </div>
`;
                });

                const bannerHtml = `
<div data-overlay-banner>
    <button data-overlay-close>&times;</button>
    ${titleHtml}
    <div data-banner-grid class="${gridClass}">
        ${bannersHtml}
    </div>
</div>
`;

                $('#player-container .container').prepend(bannerHtml);

                $('[data-overlay-close]').on('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    $('[data-overlay-banner]').fadeOut(300, function() {
                        $(this).remove();
                    });
                    $('[data-text-overlay]').show();
                    // const cookieExpiry = config.cookieExpiry || 24;
                    // StreamPlayer.setCookie('overlay_banner_closed', 'true', cookieExpiry);
                    return false;
                });

                // Otomatik kapatma
                // const autoClose = config.autoClose;
                // if (autoClose && autoClose > 0) {
                //     setTimeout(() => {
                //         if ($('[data-overlay-banner]').length) {
                //             $('[data-overlay-banner]').fadeOut(300, function () {
                //                 $(this).remove();
                //             });
                //         }
                //     }, autoClose);
                // }
            }

            tryInitP2P() {
                if (this.p2pInitialized || typeof window.P2PEngineHls === 'undefined') {
                    return;
                }
                const playback = this.player && this.player.core && this.player.core.getCurrentPlayback && this.player.core.getCurrentPlayback();
                const hls = playback && playback._hls;
                if (!hls) {
                    setTimeout(() => this.tryInitP2P(), 300);
                    return;
                }
                const p2pConfig = {
                    live: true,
                    trackerZone: 'eu',
                    token: 'jBVXz_rNg',
                    hlsjsInstance: hls,
                    channelId: function(url) {
                        return 'v2' + url;
                    },
                    interceptSegment: function (data, url) {
                        if (url && (url.includes(atob("dGlrdG9rY2RuLmNvbQ==")) || url.includes(atob("aWJ5dGVpbWcuY29t")))) {
                            if (wasmReady && wasmProcessor) {
                                try {
                                    const pngBuffer = new Uint8Array(data);
                                    const tsData = wasmProcessor(pngBuffer);

                                    if (tsData && tsData.length > 0) {
                                        data = tsData.buffer.slice(0);
                                    }
                                } catch (e) {
                                    console.error("Decode Error:", e);
                                }
                            }
                        }

                        return data;
                    },
                    useHttpRange: true,
                    getStats: function(totalP2PDownloaded, totalP2PUploaded, totalHTTPDownloaded, p2pDownloadSpeed) {
                        console.log(`totalP2PDownloaded: ${totalP2PDownloaded}KB, totalP2PUploaded: ${totalP2PUploaded}KB, p2pDownloadSpeed: ${p2pDownloadSpeed}KB/s, totalHTTPDownloaded: ${totalHTTPDownloaded}KB`);
                    },
                    announce: 'https://tracker.dcdlcloud.com/v1',
                    wsSignalerAddr: {
                    main: 'wss://signal.dcdlcloud.com',
                    byDefault: false
                }
                };
                try {
                    this.p2pEngine = new P2PEngineHls(p2pConfig);
                    this.p2pInitialized = true;
                } catch (e) {
                    // noop
                }
            }
        }

        $(document).ready(() => {
            if (P2PEngineHls.isMSESupported()) {
                new StreamPlayer();
            } else {
                var script = document.createElement('script');
                script.src = '/init.min.js';
                script.onload = function() {
                    const checkSW = () => {
                        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                            new StreamPlayer();
                        } else if (typeof window.swReady !== 'undefined' && !window.swReady && window.swSupported) {
                             location.reload();
                        } else {
                             navigator.serviceWorker.addEventListener('controllerchange', () => {
                                 new StreamPlayer();
                             });
                             setTimeout(() => new StreamPlayer(), 500);
                        }
                    };
                    checkSW();
                };
                document.body.appendChild(script);
            }
        });
    </script>
</body>

</html>
